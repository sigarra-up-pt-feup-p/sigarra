<html>

        <title>Sigarra</title>
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black">
        <style>
        body {
            background: linear-gradient(145deg, #f5bad9, #eaf491);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 20px;
        }

        a {
            text-decoration: none;
            background: linear-gradient(145deg, #ffd6ec, #e0c3fc);
            padding: 15px 30px;
            border-radius: 40px;
            color: #5a4e7c;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 8px 15px rgba(200, 150, 255, 0.3);
            transition: all 0.3s ease;
        }

        a:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(200, 150, 255, 0.5);
            background: linear-gradient(145deg, #ffc1e3, #d5b3ff);
        }

        a:active {
            transform: scale(0.95);
        }
    </style>
    </head>
